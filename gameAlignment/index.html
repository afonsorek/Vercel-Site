        .tooltip-container .tooltip-text {

            width: 220px;

                const answer = responses[index];
                if (answer === undefined) return;
                let itemScore = item.direct ? answer : (6 - answer);
                scores[item.dim] += itemScore;
                maxScores[item.dim] += 5;
            });

            return {
                micro: maxScores.micro > 0 ? (scores.micro / maxScores.micro) * 100 : 0,
                meso: maxScores.meso > 0 ? (scores.meso / maxScores.meso) * 100 : 0,
                macro: maxScores.macro > 0 ? (scores.macro / maxScores.macro) * 100 : 0
            };
        }

        // =====================================================================
        // PROFILE CLASSIFICATION
        // Uses standard deviation of normalized scores to determine dominance.
        // - Low std + all above median → all_rounder
        // - Mid std + top two close → hybrid
        // - High std or clear top → pure
        // =====================================================================
        function determineProfile(percentages) {
            const vals = [
                { type: 'micro', val: percentages.micro },
                { type: 'meso', val: percentages.meso },
                { type: 'macro', val: percentages.macro }
            ];

            const mean = (vals[0].val + vals[1].val + vals[2].val) / 3;
            const variance = vals.reduce((acc, v) => acc + Math.pow(v.val - mean, 2), 0) / 3;
            const stdDev = Math.sqrt(variance);

            const sorted = [...vals].sort((a, b) => b.val - a.val);
            const top = sorted[0];
            const sec = sorted[1];
            const third = sorted[2];

            const gapTopSec = top.val - sec.val;
            const gapTopThird = top.val - third.val;

            // All-rounder: low spread (std < 10) and all dimensions engaged (min > 40%)
            if (stdDev < 10 && third.val > 40) {
                return 'all_rounder';
            }

            // Pure profile: clear single dominance (top is >12 points above second)
            if (gapTopSec > 12) {
                return `pure_${top.type}`;
            }

            // Hybrid: top two are close, both clearly above third
            if (gapTopSec <= 12 && gapTopThird > 15) {
                const pair = [top.type, sec.type].sort().join('_');
                const hybridMap = {
                    'meso_micro': 'meso_micro',
                    'macro_micro': 'macro_micro',
                    'macro_meso': 'macro_meso'
                };
                return hybridMap[pair] || `pure_${top.type}`;
            }

            // Fallback: if top is clearly dominant even with moderate spread
            if (gapTopSec > 8) {
                return `pure_${top.type}`;
            }

            // Close spread but not all_rounder (third too low)
            const pair = [top.type, sec.type].sort().join('_');
            const hybridMap = {
                'meso_micro': 'meso_micro',
                'macro_micro': 'macro_micro',
                'macro_meso': 'macro_meso'
            };
            return hybridMap[pair] || 'all_rounder';
        }

        // =====================================================================
        // DYNAMIC GAME SELECTION
        // Cosine similarity between user profile vector and each game's
        // dimensional weight vector. Selects top 8 most aligned games.
        // =====================================================================
        function selectGames(percentages) {
            const userVec = [percentages.micro / 100, percentages.meso / 100, percentages.macro / 100];
            const userMag = Math.sqrt(userVec[0]**2 + userVec[1]**2 + userVec[2]**2);

            if (userMag === 0) return gameDatabase.slice(0, 8);

            const scored = gameDatabase.map(game => {
                const gameVec = [game.micro, game.meso, game.macro];
                const gameMag = Math.sqrt(gameVec[0]**2 + gameVec[1]**2 + gameVec[2]**2);
                const dot = userVec[0]*gameVec[0] + userVec[1]*gameVec[1] + userVec[2]*gameVec[2];
                const cosSim = gameMag > 0 ? dot / (userMag * gameMag) : 0;

                // Magnitude bonus: prefer games that are intense in the
                // user's strong dimensions (not just directionally aligned)
                const intensityBonus = dot / 3;

                return { ...game, score: cosSim * 0.7 + intensityBonus * 0.3 };
            });

            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, 8);
        }

        // =====================================================================
        // VENN POSITION — Barycentric coordinates
        // Maps [micro%, meso%, macro%] to 2D position within the Venn triangle.
        // =====================================================================
        function calculateVennPosition(percentages) {
            const total = percentages.micro + percentages.meso + percentages.macro;
            if (total === 0) return { cx: 150, cy: 130 };

            const wMicro = percentages.micro / total;
            const wMeso = percentages.meso / total;
            const wMacro = percentages.macro / total;

            // Triangle vertices (matching the SVG circle centers)
            const microPos = { x: 110, y: 110 };
            const mesoPos = { x: 190, y: 110 };
            const macroPos = { x: 150, y: 180 };

            return {
                cx: Math.round(wMicro * microPos.x + wMeso * mesoPos.x + wMacro * macroPos.x),
                cy: Math.round(wMicro * microPos.y + wMeso * mesoPos.y + wMacro * macroPos.y)
            };
        }

        // =====================================================================

        // =====================================================================
        function startSurvey() {
            shuffledItems = [...surveyItems].sort(() => Math.random() - 0.5);

        function renderSurveyBase() {
            const app = document.getElementById('app');

                        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
                    </div>

                               oninput="updateSliderValue(this.value)">

                    <div class="flex justify-between items-center mt-8 pt-8 border-t-2 border-gray-800">

                            &larr; Voltar
                        </button>
                        <button id="btn-next" onclick="nextItem()" class="brutalist-btn px-10 py-4 text-xl font-bold tracking-wide">
                            Avançar &rarr;
                        </button>
                    </div>
                </div>
            `;
            updateQuestionData();
        }

        function updateQuestionData() {
            const item = shuffledItems[currentIndex];
            // Progress: show 100% when on the last question
            const progress = ((currentIndex + 1) / shuffledItems.length) * 100;

            document.getElementById('question-counter').innerText = "Afirmação " + (currentIndex + 1) + " de " + shuffledItems.length;
            document.getElementById('progress-bar').style.width = progress + "%";

            const textEl = document.getElementById('question-text');
            textEl.style.opacity = 0;
            setTimeout(() => {
                textEl.innerText = item.text;
                textEl.style.opacity = 1;
                textEl.style.transition = "opacity 0.2s ease-out";
            }, 100);

            const currentVal = responses[currentIndex] !== undefined ? responses[currentIndex] : 3;
            responses[currentIndex] = currentVal;
            document.getElementById('response-slider').value = currentVal;
            document.getElementById('slider-feedback').textContent = sliderLabels[currentVal];

            document.getElementById('btn-back').disabled = (currentIndex === 0);
            document.getElementById('btn-next').innerText = (currentIndex === shuffledItems.length - 1) ? 'Ver Diagnóstico' : 'Avançar \u2192';
        }

        function updateSliderValue(val) {
            const intVal = parseInt(val, 10);
            responses[currentIndex] = intVal;
            document.getElementById('slider-feedback').textContent = sliderLabels[intVal];
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                updateQuestionData();
            }
        }

        function nextItem() {
            currentIndex++;
            if (currentIndex < shuffledItems.length) {
                updateQuestionData();
            } else {
                renderResults();
            }
        }

        // =====================================================================
        // RENDER: Results
        // =====================================================================
        function renderResults() {
            const percentages = calculateScores();
            const pMicro = Math.round(percentages.micro);
            const pMeso = Math.round(percentages.meso);
            const pMacro = Math.round(percentages.macro);

            const profileKey = determineProfile(percentages);
            const profile = profiles[profileKey];
            const pos = calculateVennPosition(percentages);

            const selectedGames = selectGames(percentages);

            const fallbackImg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZmlsbD0iI2ZmZiIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5JbWFnZW0gSW5kaXNwb27DrXZlbDwvdGV4dD48L3N2Zz4=";

            let gamesHTML = '';
            selectedGames.forEach(game => {
                const steamUrl = `https://store.steampowered.com/app/${game.appId}/`;

            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="fade-in w-full mt-8 px-4" id="report-content">

                    <div class="flex justify-between items-center mb-8 border-b-2 border-gray-800 pb-4">

                            <p class="text-lg md:text-xl leading-relaxed text-gray-300 mb-8 border-l-4 border-white pl-4">${profile.description}</p>

                            <div class="grid grid-cols-3 gap-2">
                                <div class="brutalist-border p-3 text-center">
                                    <div class="text-xs uppercase text-gray-400 mb-2 font-bold">Execução</div>
                                    <div class="text-2xl font-bold">${pMicro}%</div>
                                </div>
                                <div class="brutalist-border p-3 text-center">
                                    <div class="text-xs uppercase text-gray-400 mb-2 font-bold">Adaptação</div>
                                    <div class="text-2xl font-bold">${pMeso}%</div>
                                </div>
                                <div class="brutalist-border p-3 text-center">
                                    <div class="text-xs uppercase text-gray-400 mb-2 font-bold">Sistemas</div>
                                    <div class="text-2xl font-bold">${pMacro}%</div>
                                </div>
                            </div>
                        </div>

                        <div class="relative w-full max-w-[320px] mx-auto aspect-square flex justify-center items-center p-4">

                            <!-- Tooltips -->
                            <div class="absolute top-[8%] left-[28%] z-10 no-print transform -translate-x-1/2">
                                <div class="tooltip-container text-xs rounded-full border border-white w-6 h-6 font-bold">i
                                    <span class="tooltip-text">Foco na execução mecânica, reflexos e precisão. Exemplo: Jogos de plataforma difíceis ou FPS puro.</span>
                                </div>
                            </div>

                            <div class="absolute top-[8%] right-[28%] z-10 no-print transform translate-x-1/2">
                                <div class="tooltip-container text-xs rounded-full border border-white w-6 h-6 font-bold">i
                                    <span class="tooltip-text">Foco na dedução social, psicologia e probabilidade humana. Exemplo: Jogos de blefe ou dedução.</span>
                                </div>
                            </div>

                            <div class="absolute bottom-[10%] left-[50%] z-10 no-print transform -translate-x-1/2">
                                <div class="tooltip-container text-xs rounded-full border border-white w-6 h-6 font-bold">i
                                    <span class="tooltip-text">Foco em planejamento a longo prazo, otimização e sistemas lógicos. Exemplo: Jogos de estratégia.</span>
                                </div>
                            </div>

                            <!-- SVG Venn Diagram -->
                            <svg viewBox="0 0 300 300" class="w-full h-full overflow-visible" role="img" aria-label="Diagrama de Venn mostrando posição do perfil entre Micro, Meso e Macro">
                                <circle cx="110" cy="110" r="85" fill="rgba(255,255,255,0.03)" stroke="#fff" stroke-width="2"/>
                                <text x="70" y="55" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">MICRO</text>

                                <circle cx="190" cy="110" r="85" fill="rgba(255,255,255,0.03)" stroke="#fff" stroke-width="2"/>
                                <text x="230" y="55" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">MESO</text>

                                <circle cx="150" cy="180" r="85" fill="rgba(255,255,255,0.03)" stroke="#fff" stroke-width="2"/>
                                <text x="150" y="270" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">MACRO</text>

                                <!-- Dynamic Position Marker -->
                                <circle cx="${pos.cx}" cy="${pos.cy}" r="6" fill="#fff"/>
                                <text x="${pos.cx}" y="${pos.cy - 12}" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle" class="uppercase">Você</text>
                            </svg>
                        </div>
                    </div>

                    <div class="mb-8 print-break-inside-avoid mt-4">

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16 print-break-inside-avoid">
                        ${gamesHTML}

                    <div class="border-t-2 border-gray-800 pt-8 mt-12 flex justify-center no-print">
                        <button id="btn-restart" onclick="startSurvey()" class="brutalist-btn px-12 py-4 text-lg font-bold uppercase tracking-wide">
                            Executar Nova Análise
                        </button>
                    </div>
                </div>
            `;
        }

        // =====================================================================
        // INIT

        document.addEventListener('DOMContentLoaded', renderInitialScreen);
    </script>
